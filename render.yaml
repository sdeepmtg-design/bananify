services:
  - type: web
    name: telegram-nano-banana-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: OPENROUTER_IMAGE_MODEL
        value: google/gemini-3-pro-image
