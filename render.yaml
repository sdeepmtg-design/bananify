services:
  - type: web
    name: telegram-nano-banana-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: ADMIN_USER_IDS
        sync: false
      - key: OPENROUTER_IMAGE_MODEL
        value: google/gemini-3-pro-image
      - key: MAX_PARALLEL_GENERATIONS
        value: "2"
      - key: MAX_PROMPT_CHARS
        value: "1800"
      - key: DB_PATH
        value: bot_data.sqlite3
